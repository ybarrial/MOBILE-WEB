<div class="loading-overlay" *ngIf="isLoading$ | async">
    <app-loading-dancing-squares [size]="22" [gap]="8"></app-loading-dancing-squares>
</div>
<div class="container mt-2">
    <div class="bar-buttons-top">
        <div class="title-f6">Lista de Perfiles</div>
    </div>
    <div class="bar-buttons-top d-flex justify-content-end w-100">
        <button (click)="onNewProfile()" class="general-button btn-primary me-2">
            <i class="fas fa-plus"></i>
            Nuevo Perfil
        </button>
        <button class="general-button btn-secondary">
            <i class="fas fa-arrow-left"></i>
            Regresar
        </button>
    </div>
</div>
<div class="table-container table-responsive">
    <table class="table global-table table-striped table-hover">
        <thead>
            <th class="text-center">Cod Empresa</th>
            <th class="text-center">Cod Sucursal</th>
            <th class="text-center">Perfil</th>
            <th class="text-center">Perfil Detalle</th>
            <th class="text-center">Tipo de Perfil</th>
            <th class="text-center">Acciones</th>
        </thead>
        <tbody>
            <tr *ngFor="let profile of profiles">
                <td class="text-center">{{profile.codEmpresa}}</td>
                <td class="text-start">{{profile.codSucursal}}</td>
                <td class="text-start">{{profile.profileShortName}}</td>
                <td class="text-start">{{profile.profileLongName}}</td>
                <td class="text-center">{{profile.profileType}}</td>
                <td class="text-center">
                    <button type="button" title="Rendir cuenta" type="button" class="btn btn-success btn-sm me-1">
                        <i class="fa fa-plus"></i>
                    </button>
                    <button style="background-color: #0063A7;" title="Ver Detalle" type="button" class="btn btn-primary btn-sm">
                        <i class="fa fa-eye"></i>
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
